# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ai_conference}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_FILE_SIZE:5MB}
file.upload-dir=${UPLOAD_DIR:./uploads}

# AI Configuration
ai.enabled=${AI_ENABLED:true}
google.ai.api.key=${GOOGLE_AI_API_KEY:}
google.ai.model=${GOOGLE_AI_MODEL:gemini-2.0-flash}
